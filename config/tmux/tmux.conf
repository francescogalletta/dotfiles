# ── Terminal ──────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"

# ── General ───────────────────────────────────────────────────────────────────
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 0
set -g focus-events on
set -g status-interval 5

# ── Vi copy mode ──────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ── Splits (preserve current path) ───────────────────────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Pane navigation ───────────────────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Reload ────────────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ── Status bar (Catppuccin Mocha) ─────────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 40

set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa]  "
set -g status-right "#[fg=#b4befe]#[bg=#b4befe,fg=#1e1e2e] %H:%M "

setw -g window-status-format         " #[fg=#6c7086]#I  #W "
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#a6e3a1,bold] #I  #W #[bg=#1e1e2e,fg=#a6e3a1]"
setw -g window-status-separator      ""

# ── Borders ───────────────────────────────────────────────────────────────────
set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# ── Messages ──────────────────────────────────────────────────────────────────
set -g message-style "bg=#313244,fg=#cdd6f4"
