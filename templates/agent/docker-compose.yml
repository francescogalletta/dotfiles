services:
  app:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    env_file:
      - path: .env
        required: false
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - __pycache__
        - action: rebuild
          path: uv.lock
