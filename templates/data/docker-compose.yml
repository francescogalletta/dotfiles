services:
  jupyter:
    build: .
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --NotebookApp.token='' --NotebookApp.password=''
    ports:
      - "8888:8888"
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      - DATABASE_URL=${DATABASE_URL:-}
    env_file:
      - path: .env
        required: false
    develop:
      watch:
        - action: sync
          path: .
          target: /workspace
        - action: rebuild
          path: uv.lock

  streamlit:
    build: .
    command: streamlit run app/main.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      - DATABASE_URL=${DATABASE_URL:-}
    env_file:
      - path: .env
        required: false
    develop:
      watch:
        - action: sync
          path: .
          target: /workspace
        - action: rebuild
          path: uv.lock

